<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#334155"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
  </defs>
  <!-- Ears -->
  <polygon points="26,52 36,20 50,50" fill="#475569"/>
  <polygon points="70,50 84,20 94,52" fill="#475569"/>
  <polygon points="30,50 37,26 47,49" fill="white" opacity="0.6"/>
  <polygon points="73,49 83,26 90,50" fill="white" opacity="0.6"/>
  <!-- Head -->
  <circle cx="60" cy="68" r="36" fill="url(#body)"/>
  <!-- White mask -->
  <ellipse cx="60" cy="76" rx="22" ry="18" fill="white" opacity="0.55"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="65" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="65" rx="10" ry="11" fill="white"/>
  <!-- Irises -->
  <ellipse cx="46" cy="66" rx="7.5" ry="9" fill="url(#iris)"/>
  <ellipse cx="74" cy="66" rx="7.5" ry="9" fill="url(#iris)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="66" rx="4" ry="6.5" fill="#0a0a0a"/>
  <ellipse cx="74" cy="66" rx="4" ry="6.5" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="61" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="77" cy="61" r="2.5" fill="white" opacity="0.9"/>
  <!-- Nose -->
  <ellipse cx="60" cy="80" rx="6" ry="4.5" fill="#0f172a"/>
  <ellipse cx="58.5" cy="78.5" rx="2" ry="1.2" fill="white" opacity="0.4"/>
  <!-- Mouth -->
  <path d="M56 84 Q60 89 64 84" stroke="#334155" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
