<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="60%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <radialGradient id="fire" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Wings (behind head) -->
  <ellipse cx="18" cy="58" rx="18" ry="26" fill="#065f46" opacity="0.9" transform="rotate(-20,18,58)"/>
  <ellipse cx="102" cy="58" rx="18" ry="26" fill="#065f46" opacity="0.9" transform="rotate(20,102,58)"/>
  <!-- Wing membrane lines -->
  <line x1="18" y1="40" x2="8" y2="75" stroke="#047857" stroke-width="1.5" opacity="0.6"/>
  <line x1="18" y1="40" x2="28" y2="72" stroke="#047857" stroke-width="1.5" opacity="0.6"/>
  <line x1="102" y1="40" x2="92" y2="72" stroke="#047857" stroke-width="1.5" opacity="0.6"/>
  <line x1="102" y1="40" x2="112" y2="75" stroke="#047857" stroke-width="1.5" opacity="0.6"/>
  <!-- Horns -->
  <polygon points="42,36 46,14 52,38" fill="#064e3b"/>
  <polygon points="68,38 74,14 78,36" fill="#064e3b"/>
  <ellipse cx="46" cy="20" rx="3" ry="6" fill="#6ee7b7" opacity="0.5"/>
  <ellipse cx="74" cy="20" rx="3" ry="6" fill="#6ee7b7" opacity="0.5"/>
  <!-- Head -->
  <circle cx="60" cy="70" r="36" fill="url(#body)"/>
  <!-- Scales texture -->
  <circle cx="40" cy="58" r="5" fill="#047857" opacity="0.3"/>
  <circle cx="52" cy="52" r="5" fill="#047857" opacity="0.3"/>
  <circle cx="64" cy="50" r="5" fill="#047857" opacity="0.3"/>
  <circle cx="76" cy="52" r="5" fill="#047857" opacity="0.3"/>
  <circle cx="80" cy="62" r="5" fill="#047857" opacity="0.3"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="67" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="67" rx="10" ry="11" fill="white"/>
  <!-- Irises -->
  <ellipse cx="46" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <ellipse cx="74" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <!-- Slit pupils -->
  <ellipse cx="46" cy="68" rx="2.5" ry="7.5" fill="#0a0a0a"/>
  <ellipse cx="74" cy="68" rx="2.5" ry="7.5" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="63" r="2" fill="white" opacity="0.9"/>
  <circle cx="77" cy="63" r="2" fill="white" opacity="0.9"/>
  <!-- Nostril -->
  <ellipse cx="56" cy="80" rx="3" ry="2" fill="#047857"/>
  <ellipse cx="64" cy="80" rx="3" ry="2" fill="#047857"/>
  <!-- Mouth / fang hint -->
  <path d="M52 83 Q60 90 68 83" stroke="#064e3b" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="57" y1="83" x2="55" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="63" y1="83" x2="65" y2="88" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Fire breath hint -->
  <ellipse cx="60" cy="105" rx="14" ry="8" fill="url(#fire)" opacity="0.5"/>
</svg>
