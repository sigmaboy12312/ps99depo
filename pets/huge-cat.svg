<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer aura rings -->
  <circle cx="60" cy="65" r="56" fill="url(#aura)"/>
  <circle cx="60" cy="65" r="48" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <circle cx="60" cy="65" r="44" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.4"/>
  <!-- Sparkles -->
  <path d="M15,35 L17,28 L19,35 L26,37 L19,39 L17,46 L15,39 L8,37 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M100,20 L102,13 L104,20 L111,22 L104,24 L102,31 L100,24 L93,22 Z" fill="#fde68a" opacity="0.9"/>
  <path d="M108,80 L110,74 L112,80 L118,82 L112,84 L110,90 L108,84 L102,82 Z" fill="#fbbf24" opacity="0.8"/>
  <path d="M5,80 L7,74 L9,80 L15,82 L9,84 L7,90 L5,84 L-1,82 Z" fill="#fde68a" opacity="0.7"/>
  <!-- Ears -->
  <polygon points="24,50 32,20 46,48" fill="#d97706" filter="url(#glow-filter)"/>
  <polygon points="74,48 88,20 96,50" fill="#d97706" filter="url(#glow-filter)"/>
  <polygon points="27,48 33,26 43,47" fill="#fef9c3" opacity="0.8"/>
  <polygon points="77,47 87,26 93,48" fill="#fef9c3" opacity="0.8"/>
  <!-- Head -->
  <circle cx="60" cy="70" r="36" fill="url(#body)" filter="url(#glow-filter)"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="67" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="67" rx="10" ry="11" fill="white"/>
  <!-- Irises — gold/amber -->
  <ellipse cx="46" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <ellipse cx="74" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <ellipse cx="74" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <!-- Shine (triple for that legendary look) -->
  <circle cx="49" cy="63" r="3" fill="white" opacity="0.95"/>
  <circle cx="50.5" cy="65" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="77" cy="63" r="3" fill="white" opacity="0.95"/>
  <circle cx="78.5" cy="65" r="1.5" fill="white" opacity="0.7"/>
  <!-- Nose -->
  <ellipse cx="60" cy="79" rx="4" ry="3" fill="#b45309"/>
  <!-- Mouth -->
  <path d="M56 82 Q60 87 64 82" stroke="#78350f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Golden whiskers -->
  <line x1="10" y1="76" x2="52" y2="78" stroke="#fde68a" stroke-width="1.5" opacity="0.9"/>
  <line x1="10" y1="81" x2="52" y2="81" stroke="#fde68a" stroke-width="1.5" opacity="0.9"/>
  <line x1="68" y1="78" x2="110" y2="76" stroke="#fde68a" stroke-width="1.5" opacity="0.9"/>
  <line x1="68" y1="81" x2="110" y2="81" stroke="#fde68a" stroke-width="1.5" opacity="0.9"/>
  <!-- HUGE label -->
  <rect x="42" y="100" width="36" height="14" rx="7" fill="#b45309" opacity="0.9"/>
  <text x="60" y="111" font-family="Segoe UI,sans-serif" font-size="8" font-weight="800" fill="#fef9c3" text-anchor="middle">HUGE</text>
</svg>
