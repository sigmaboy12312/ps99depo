<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>
  <!-- Glow aura -->
  <circle cx="60" cy="65" r="52" fill="url(#glow)"/>
  <!-- Sparkles -->
  <path d="M20,30 L22,22 L24,30 L22,38 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M16,30 L24,28 L32,30 L24,32 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M95,25 L97,18 L99,25 L97,32 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M91,25 L99,23 L107,25 L99,27 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M103,78 L105,72 L107,78 L105,84 Z" fill="#fde68a" opacity="0.7"/>
  <path d="M99,78 L107,76 L115,78 L107,80 Z" fill="#fde68a" opacity="0.7"/>
  <!-- Ears -->
  <polygon points="24,52 32,22 46,50" fill="#d97706"/>
  <polygon points="74,50 88,22 96,52" fill="#d97706"/>
  <polygon points="27,50 33,28 43,49" fill="#fef08a" opacity="0.7"/>
  <polygon points="77,49 87,28 93,50" fill="#fef08a" opacity="0.7"/>
  <!-- Head -->
  <circle cx="60" cy="70" r="36" fill="url(#body)"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="67" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="67" rx="10" ry="11" fill="white"/>
  <!-- Irises -->
  <ellipse cx="46" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <ellipse cx="74" cy="68" rx="7.5" ry="9" fill="url(#iris)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <ellipse cx="74" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="63" r="2.5" fill="white" opacity="0.95"/>
  <circle cx="77" cy="63" r="2.5" fill="white" opacity="0.95"/>
  <!-- Nose -->
  <ellipse cx="60" cy="79" rx="4" ry="3" fill="#b45309"/>
  <!-- Mouth -->
  <path d="M56 82 Q60 87 64 82" stroke="#78350f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="10" y1="76" x2="52" y2="78" stroke="#fde68a" stroke-width="1.3" opacity="0.8"/>
  <line x1="10" y1="81" x2="52" y2="81" stroke="#fde68a" stroke-width="1.3" opacity="0.8"/>
  <line x1="68" y1="78" x2="110" y2="76" stroke="#fde68a" stroke-width="1.3" opacity="0.8"/>
  <line x1="68" y1="81" x2="110" y2="81" stroke="#fde68a" stroke-width="1.3" opacity="0.8"/>
</svg>
