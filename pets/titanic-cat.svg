<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="rainbow-aura" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="25%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="75%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="aura2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#701a75"/>
    </radialGradient>
  </defs>
  <!-- Massive rainbow aura rings -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#rainbow-aura)" stroke-width="4" opacity="0.7"/>
  <circle cx="60" cy="60" r="53" fill="none" stroke="url(#rainbow-aura)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="60" cy="60" r="57" fill="url(#aura2)"/>
  <!-- Sparkle explosions -->
  <path d="M10,20 L12,12 L14,20 L22,22 L14,24 L12,32 L10,24 L2,22 Z" fill="#f472b6"/>
  <path d="M105,15 L107,8 L109,15 L116,17 L109,19 L107,26 L105,19 L98,17 Z" fill="#38bdf8"/>
  <path d="M112,85 L114,78 L116,85 L123,87 L116,89 L114,96 L112,89 L105,87 Z" fill="#34d399"/>
  <path d="M2,85 L4,78 L6,85 L13,87 L6,89 L4,96 L2,89 L-5,87 Z" fill="#fbbf24"/>
  <circle cx="60" cy="5" r="3" fill="#a78bfa"/>
  <circle cx="115" cy="50" r="2.5" fill="#f472b6"/>
  <circle cx="5" cy="50" r="2.5" fill="#38bdf8"/>
  <!-- Ear sparkle wisps -->
  <path d="M22,45 Q10,30 20,15 Q22,30 30,42" fill="#c084fc" opacity="0.8"/>
  <path d="M98,45 Q110,30 100,15 Q98,30 90,42" fill="#38bdf8" opacity="0.8"/>
  <!-- Ears -->
  <polygon points="24,48 32,18 46,46" fill="#7c3aed"/>
  <polygon points="74,46 88,18 96,48" fill="#7c3aed"/>
  <polygon points="27,46 33,24 43,45" fill="#e879f9" opacity="0.8"/>
  <polygon points="77,45 87,24 93,46" fill="#e879f9" opacity="0.8"/>
  <!-- Head -->
  <circle cx="60" cy="68" r="36" fill="url(#body)"/>
  <!-- Prismatic sheen -->
  <circle cx="60" cy="68" r="35" fill="none" stroke="url(#rainbow-aura)" stroke-width="2" opacity="0.4"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="65" rx="11" ry="12" fill="white"/>
  <ellipse cx="74" cy="65" rx="11" ry="12" fill="white"/>
  <!-- Irises (rainbow ring) -->
  <ellipse cx="46" cy="66" rx="8.5" ry="10" fill="url(#iris)"/>
  <ellipse cx="74" cy="66" rx="8.5" ry="10" fill="url(#iris)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="66" rx="4" ry="8" fill="#0a0a0a"/>
  <ellipse cx="74" cy="66" rx="4" ry="8" fill="#0a0a0a"/>
  <!-- Massive shine -->
  <circle cx="49.5" cy="60" r="3.5" fill="white" opacity="0.98"/>
  <circle cx="51" cy="62.5" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="47" cy="62" r="1" fill="white" opacity="0.6"/>
  <circle cx="77.5" cy="60" r="3.5" fill="white" opacity="0.98"/>
  <circle cx="79" cy="62.5" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="75" cy="62" r="1" fill="white" opacity="0.6"/>
  <!-- Nose -->
  <ellipse cx="60" cy="77" rx="4.5" ry="3.5" fill="#e879f9"/>
  <!-- Mouth -->
  <path d="M55 80 Q60 86 65 80" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Rainbow whiskers -->
  <line x1="8" y1="73" x2="51" y2="76" stroke="#f472b6" stroke-width="1.5" opacity="0.85"/>
  <line x1="8" y1="78" x2="51" y2="79" stroke="#38bdf8" stroke-width="1.5" opacity="0.85"/>
  <line x1="69" y1="76" x2="112" y2="73" stroke="#34d399" stroke-width="1.5" opacity="0.85"/>
  <line x1="69" y1="79" x2="112" y2="78" stroke="#fbbf24" stroke-width="1.5" opacity="0.85"/>
  <!-- TITANIC badge -->
  <rect x="30" y="100" width="60" height="15" rx="7" fill="#6d28d9" opacity="0.95"/>
  <text x="60" y="111.5" font-family="Segoe UI,sans-serif" font-size="8" font-weight="800" fill="#fde68a" text-anchor="middle">TITANIC</text>
</svg>
