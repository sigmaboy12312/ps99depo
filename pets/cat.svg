<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <radialGradient id="eye-l" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
    <radialGradient id="eye-r" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
  </defs>
  <!-- Ears -->
  <polygon points="24,52 32,22 46,50" fill="#ea580c"/>
  <polygon points="74,50 88,22 96,52" fill="#ea580c"/>
  <polygon points="27,50 33,28 43,49" fill="#fda4af"/>
  <polygon points="77,49 87,28 93,50" fill="#fda4af"/>
  <!-- Head -->
  <circle cx="60" cy="70" r="36" fill="url(#body)"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="67" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="67" rx="10" ry="11" fill="white"/>
  <!-- Irises -->
  <ellipse cx="46" cy="68" rx="7.5" ry="9" fill="url(#eye-l)"/>
  <ellipse cx="74" cy="68" rx="7.5" ry="9" fill="url(#eye-r)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <ellipse cx="74" cy="68" rx="3.5" ry="7" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="63" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="77" cy="63" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="64.5" r="1" fill="white" opacity="0.6"/>
  <circle cx="78" cy="64.5" r="1" fill="white" opacity="0.6"/>
  <!-- Nose -->
  <ellipse cx="60" cy="79" rx="4" ry="3" fill="#ec4899"/>
  <!-- Mouth -->
  <path d="M56 82 Q60 87 64 82" stroke="#9f1239" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="38" cy="76" rx="7" ry="4" fill="#fda4af" opacity="0.4"/>
  <ellipse cx="82" cy="76" rx="7" ry="4" fill="#fda4af" opacity="0.4"/>
  <!-- Whiskers -->
  <line x1="10" y1="76" x2="52" y2="78" stroke="white" stroke-width="1.3" opacity="0.75"/>
  <line x1="10" y1="81" x2="52" y2="81" stroke="white" stroke-width="1.3" opacity="0.75"/>
  <line x1="68" y1="78" x2="110" y2="76" stroke="white" stroke-width="1.3" opacity="0.75"/>
  <line x1="68" y1="81" x2="110" y2="81" stroke="white" stroke-width="1.3" opacity="0.75"/>
</svg>
