<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="body" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <radialGradient id="iris" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </radialGradient>
  </defs>
  <!-- Floppy ears -->
  <ellipse cx="28" cy="62" rx="16" ry="22" fill="#d97706" transform="rotate(-12,28,62)"/>
  <ellipse cx="92" cy="62" rx="16" ry="22" fill="#d97706" transform="rotate(12,92,62)"/>
  <!-- Head -->
  <circle cx="60" cy="65" r="36" fill="url(#body)"/>
  <!-- Snout area -->
  <ellipse cx="60" cy="84" rx="18" ry="12" fill="#fef3c7" opacity="0.7"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="63" rx="10" ry="11" fill="white"/>
  <ellipse cx="74" cy="63" rx="10" ry="11" fill="white"/>
  <!-- Irises -->
  <ellipse cx="46" cy="64" rx="7.5" ry="9" fill="url(#iris)"/>
  <ellipse cx="74" cy="64" rx="7.5" ry="9" fill="url(#iris)"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="64" rx="4" ry="6.5" fill="#0a0a0a"/>
  <ellipse cx="74" cy="64" rx="4" ry="6.5" fill="#0a0a0a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="59" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="77" cy="59" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="61" r="1" fill="white" opacity="0.6"/>
  <circle cx="78" cy="61" r="1" fill="white" opacity="0.6"/>
  <!-- Nose -->
  <ellipse cx="60" cy="81" rx="7" ry="5" fill="#1c1917"/>
  <ellipse cx="58" cy="79.5" rx="2.5" ry="1.5" fill="white" opacity="0.4"/>
  <!-- Mouth -->
  <path d="M55 86 Q60 91 65 86" stroke="#78350f" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="36" cy="72" rx="8" ry="5" fill="#fbbf24" opacity="0.4"/>
  <ellipse cx="84" cy="72" rx="8" ry="5" fill="#fbbf24" opacity="0.4"/>
</svg>
