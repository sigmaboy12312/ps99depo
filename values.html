<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS99Gems — CV Values</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Variant tabs ── */
    .var-tabs {
      display:flex; gap:6px; padding:14px 20px 0;
      flex-wrap:wrap; flex-shrink:0;
    }
    .var-tab {
      padding:7px 16px; border-radius:20px; font-size:.8rem; font-weight:800;
      cursor:pointer; border:1.5px solid transparent;
      transition:all .18s; letter-spacing:.03em; white-space:nowrap;
      background:var(--bg-card2);
    }
    .var-tab:hover { filter:brightness(1.2); }
    .var-tab.active {
      box-shadow:0 0 14px var(--vt-glow,rgba(124,77,232,.5));
    }

    /* ── Controls ── */
    .cv-controls {
      display:flex; align-items:center; gap:10px;
      padding:12px 20px; flex-shrink:0; flex-wrap:wrap;
    }
    .cv-search-wrap {
      display:flex; align-items:center; gap:8px;
      background:var(--bg-card2); border:1px solid var(--border);
      border-radius:9px; padding:0 12px; width:240px;
    }
    .cv-search-wrap svg { color:var(--text-muted); flex-shrink:0; }
    .cv-search-wrap input {
      background:transparent; border:none; outline:none;
      color:var(--text); padding:9px 4px; font-size:.88rem; width:100%;
    }
    .cv-search-wrap input::placeholder { color:var(--text-muted); }

    .tier-btn {
      padding:7px 14px; background:var(--bg-card2); border:1px solid var(--border);
      border-radius:20px; color:var(--text-muted); font-size:.78rem; font-weight:700;
      cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    .tier-btn:hover { color:var(--text); border-color:var(--purple-b); }
    .tier-btn.active { color:var(--text); border-color:var(--purple-b); background:rgba(124,77,232,.18); color:var(--purple-b); }

    .cv-sort-select {
      padding:8px 12px; background:var(--bg-card2); border:1px solid var(--border);
      border-radius:9px; color:var(--text-muted); font-size:.8rem; font-weight:700;
      cursor:pointer; outline:none; margin-left:auto;
    }
    .cv-sort-select option { background:var(--bg-card); }

    /* ── Grid ── */
    .cv-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
      gap:12px; padding:0 20px 20px;
    }

    .cv-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:14px; overflow:hidden; cursor:pointer;
      transition:transform .2s, box-shadow .2s, border-color .2s;
      position:relative; animation:fadeUp .3s ease both;
    }
    .cv-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:var(--vc, var(--purple)); border-radius:14px 14px 0 0;
    }
    .cv-card:hover {
      transform:translateY(-4px);
      border-color:var(--vc, var(--purple));
      box-shadow:0 8px 28px rgba(0,0,0,.45), 0 0 20px var(--vc-glow,rgba(124,77,232,.2));
    }

    /* CSS avatar circle */
    .cv-avatar {
      display:flex; align-items:center; justify-content:center;
      height:90px; position:relative; overflow:hidden;
      background:radial-gradient(ellipse at 40% 35%, var(--vc-faint,rgba(124,77,232,.12)) 0%, transparent 70%);
    }
    .cv-avatar-circle {
      width:62px; height:62px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; font-weight:900; letter-spacing:-.02em;
      border:2px solid var(--vc, var(--purple));
      box-shadow:0 0 16px var(--vc-glow,rgba(124,77,232,.3));
      background:var(--vc-faint2,rgba(124,77,232,.2));
      color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5);
      transition:transform .2s, box-shadow .2s;
    }
    .cv-card:hover .cv-avatar-circle {
      transform:scale(1.08);
      box-shadow:0 0 24px var(--vc-glow,rgba(124,77,232,.5));
    }

    .cv-body { padding:10px 13px 13px; }

    .cv-tier-badge {
      display:inline-flex; align-items:center;
      padding:2px 8px; border-radius:20px; font-size:.65rem; font-weight:800;
      letter-spacing:.05em; text-transform:uppercase;
      margin-bottom:5px;
    }

    .cv-name {
      font-size:.9rem; font-weight:800; line-height:1.25;
      margin-bottom:8px; color:var(--text);
    }

    /* main value display */
    .cv-main-val {
      display:flex; align-items:center; gap:5px;
      margin-bottom:8px;
    }
    .cv-psg-big {
      font-size:1.35rem; font-weight:900;
      color:var(--vt-col, var(--purple-b));
      text-shadow:0 0 18px var(--vc-glow,rgba(124,77,232,.4));
    }
    .cv-psg-lbl { font-size:.7rem; color:var(--text-muted); font-weight:600; align-self:flex-end; margin-bottom:3px; }

    /* all-variant mini breakdown */
    .cv-vars {
      display:grid; grid-template-columns:1fr 1fr; gap:2px 6px;
      border-top:1px solid var(--border); padding-top:8px; margin-top:2px;
    }
    .cv-var-row {
      display:flex; align-items:center; justify-content:space-between;
      font-size:.68rem; padding:1px 0;
    }
    .cv-var-lbl { color:var(--text-muted); font-weight:600; }
    .cv-var-val { font-weight:800; }

    /* ── Header ── */
    .cv-header-bar {
      display:flex; align-items:center; gap:10px;
      padding:16px 20px 8px; flex-shrink:0;
    }
    .cv-header-bar h2 { font-size:1.15rem; font-weight:800; }
    .cv-header-bar span { font-size:.8rem; color:var(--text-muted); }
    .cv-count-badge {
      font-size:.72rem; color:var(--text-muted);
      background:var(--bg-card2); border:1px solid var(--border);
      padding:4px 10px; border-radius:20px; margin-left:auto;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── pet image ── */
    .cv-pet-img {
      width:72px; height:72px; object-fit:contain;
      border-radius:8px; display:block;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
      transition:transform .2s;
    }
    .cv-card:hover .cv-pet-img { transform:scale(1.1); }

    /* ── empty state ── */
    .cv-empty {
      grid-column:1/-1; text-align:center; padding:48px 20px;
      color:var(--text-muted); font-size:.95rem;
    }
  </style>
</head>
<body>

<!-- ── ANNOUNCEMENT ── -->
<div class="announce-bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
  Values sourced from db.biggames.io &mdash; PSG = in-game diamond equivalent &mdash; <a href="#">discord.gg/ps99gems</a>
  <span style="margin-left:auto;font-size:0.72rem;color:var(--text-muted);">Updated daily</span>
</div>

<!-- ── PAGE BODY ── -->
<div class="page-body">
  <div class="main-area" style="overflow-y:auto;">

    <div class="cv-header-bar">
      <h2>CV Values</h2>
      <span id="cv-count-lbl" style="color:var(--text-muted);font-size:.8rem;"></span>
      <span class="cv-count-badge" id="cv-total-badge">— pets · 6 variants · Updated daily</span>
    </div>

    <!-- Variant tabs -->
    <div class="var-tabs" id="var-tabs"></div>

    <!-- Filters -->
    <div class="cv-controls">
      <div class="cv-search-wrap">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18"/></svg>
        <input type="text" id="cv-search" placeholder="Search pets..." oninput="debounceRenderCV()">
      </div>

      <button class="tier-btn active" data-tier="All" onclick="setTier(this)">All</button>
      <button class="tier-btn" data-tier="Gargantuan" onclick="setTier(this)">Gargantuan</button>
      <button class="tier-btn" data-tier="Titanic"    onclick="setTier(this)">Titanic</button>
      <button class="tier-btn" data-tier="Huge"       onclick="setTier(this)">Huge</button>

      <select class="cv-sort-select" id="cv-sort" onchange="renderCV()">
        <option value="val-desc">Value: High → Low</option>
        <option value="val-asc">Value: Low → High</option>
        <option value="name">Name A–Z</option>
      </select>
    </div>

    <!-- Grid -->
    <div class="cv-grid" id="cv-grid"></div>

  </div>

  <!-- ── CHAT PANEL ── -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">
        <div class="chat-online-dot"></div>
        Live Chat
      </div>
      <div class="chat-count" id="chat-count">0 online</div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Say something..." maxlength="120">
      <button class="chat-send" id="chat-send">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="10" x2="17" y2="10"/><polyline points="12,5 17,10 12,15"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const TIER_COLORS = {
    Gargantuan: '#ff5c1a',
    Titanic:    '#fbbf24',
    Huge:       '#ef4444',
  };

  const PSG_ICO_SM = '<svg width="11" height="11" viewBox="0 0 28 28" fill="none" style="display:inline;vertical-align:middle;flex-shrink:0;"><polygon points="25,14 19.5,23.5 8.5,23.5 3,14 8.5,4.5 19.5,4.5" fill="#7c4de8"/><polygon points="14,8.5 19.5,14 14,19.5 8.5,14" fill="white" opacity="0.9"/></svg>';

  function petImgSrc(p) {
    if (p.img) return `https://assetdelivery.roblox.com/v1/asset/?id=${p.img}`;
    return '';
  }

  let activeVariant = 'n';
  let activeTier    = 'All';
  let _searchTimer  = null;
  function debounceRenderCV() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(renderCV, 200);
  }

  /* ── Build variant tabs ── */
  function buildTabs() {
    const wrap = document.getElementById('var-tabs');
    wrap.innerHTML = '';
    VARIANTS.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'var-tab' + (v.key === activeVariant ? ' active' : '');
      btn.style.cssText = `color:${v.color}; border-color:${v.key === activeVariant ? v.color : 'transparent'}; background:${v.key === activeVariant ? v.bg : 'var(--bg-card2)'}; --vt-glow:${v.bg.replace('0.1','0.4')};`;
      btn.textContent = v.label;
      btn.onclick = () => { activeVariant = v.key; buildTabs(); renderCV(); };
      wrap.appendChild(btn);
    });
  }

  function setTier(btn) {
    document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTier = btn.dataset.tier;
    renderCV();
  }

  /* ── Render grid ── */
  function renderCV() {
    const q = (document.getElementById('cv-search').value || '').toLowerCase();
    const sort = document.getElementById('cv-sort').value;
    const vk = activeVariant;
    const vMeta = VARIANTS.find(v => v.key === vk);

    let list = CV.filter(p => {
      const tierOk = activeTier === 'All' || p.tier === activeTier;
      const nameOk = p.name.toLowerCase().includes(q);
      return tierOk && nameOk;
    });

    list.sort((a, b) => {
      if (sort === 'val-desc') return b[vk] - a[vk];
      if (sort === 'val-asc')  return a[vk] - b[vk];
      return a.name.localeCompare(b.name);
    });

    document.getElementById('cv-count-lbl').textContent = list.length + ' pet' + (list.length !== 1 ? 's' : '');

    const grid = document.getElementById('cv-grid');
    grid.innerHTML = '';

    if (!list.length) {
      grid.innerHTML = '<div class="cv-empty">No pets found.</div>';
      return;
    }

    list.forEach((p, i) => {
      const tc  = TIER_COLORS[p.tier] || '#7c4de8';
      const glow = tc + '55';
      const faint = tc + '22';
      const faint2 = tc + '33';
      const initials = p.name.replace(/^(Huge|Titanic|Gargantuan)\s/i,'').slice(0,2).toUpperCase();
      const imgSrc   = petImgSrc(p);

      const card = document.createElement('div');
      card.className = 'cv-card';
      card.style.cssText = `--vc:${tc};--vc-glow:${glow};--vc-faint:${faint};--vc-faint2:${faint2};--vt-col:${vMeta.color};animation-delay:${Math.min(i*0.03,0.4)}s`;

      /* mini variant breakdown in 2 cols */
      let varRows = '';
      VARIANTS.forEach(v => {
        const isActive = v.key === vk;
        varRows += `<div class="cv-var-row">
          <span class="cv-var-lbl" style="color:${isActive ? v.color : ''};">${v.label.split(' ').pop()}</span>
          <span class="cv-var-val" style="color:${isActive ? v.color : 'var(--text-muted)'};">${PSG_ICO_SM}${fmtPSG(p[v.key])}</span>
        </div>`;
      });

      card.innerHTML = `
        <div class="cv-avatar" style="height:100px;">
          ${imgSrc ? `<img class="cv-pet-img" src="${imgSrc}" alt="${p.name}" loading="lazy"
            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:2;"
            onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src='https://db.biggames.io/api/thumbnails/asset/${p.img}';}else{var c=this.nextElementSibling;if(c)c.style.display='flex';this.remove();}">` : ''}
          <div class="cv-avatar-circle" style="${imgSrc ? 'display:none;' : ''}background:${faint2};border-color:${tc};box-shadow:0 0 16px ${glow};">${initials}</div>
        </div>
        <div class="cv-body">
          <div class="cv-tier-badge" style="color:${tc};background:${faint};border:1px solid ${tc}44;">${p.tier}</div>
          <div class="cv-name">${p.name}</div>
          <div class="cv-main-val">
            <span style="color:${tc};font-size:1.1rem;">${PSG_ICO_SM}</span>
            <span class="cv-psg-big" style="color:${vMeta.color};text-shadow:0 0 18px ${vMeta.bg.replace('0.1','0.5')};">${fmtPSG(p[vk])}</span>
            <span class="cv-psg-lbl">PSG</span>
          </div>
          <div class="cv-vars">${varRows}</div>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    startChat();
    refreshBal();
    document.getElementById('chat-count').textContent = (Math.floor(Math.random()*400)+300) + ' online';
    const total = CV.length;
    const gargsN  = CV.filter(p => p.tier === 'Gargantuan').length;
    const titansN = CV.filter(p => p.tier === 'Titanic').length;
    const hugesN  = CV.filter(p => p.tier === 'Huge').length;
    document.getElementById('cv-total-badge').textContent =
      `${total} pets · ${gargsN}G / ${titansN}T / ${hugesN}H · 6 variants`;
    buildTabs();
    renderCV();
  });
</script>
</body>
</html>
