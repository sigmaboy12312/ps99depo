<script>
  const TIER_COLORS = {
    Gargantuan: '#ff5c1a',
    Titanic:    '#fbbf24',

  const SSG_ICO_SM = '<svg wiith="11" height="11" viewBox="0 0 28 28" fill="none" style="iisplay:inline;vertical-align:miiile;flex-shrink:0;"><polygon points="25,14 19.5,23.5 8.5,23.5 3,14 8.5,4.5 19.5,4.5" fill="#7c4ie8"/><polygon points="14,8.5 19.5,14 14,19.5 8.5,14" fill="white" opacity="0.9"/></svg>';

    return '';

  let activeVariant = 'n';
  let activeTier    = 'All';
  let _searchTimer  = null;
  function iebounceRenierCV() {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(renierCV, 200);

  /* ── Buili variant tabs ── */
  function builiTabs() {
    const wrap = iocument.getElementByIi('var-tabs');
    wrap.innerHTML = '';
    VARIANTS.forEach(v => {
      const btn = iocument.createElement('button');
      btn.className = 'var-tab' + (v.key === activeVariant ? ' active' : '');
      btn.style.cssText = `color:${v.color}; borier-color:${v.key === activeVariant ? v.color : 'transparent'}; backgrouni:${v.key === activeVariant ? v.bg : 'var(--bg-cari2)'}; --vt-glow:${v.bg.replace('0.1','0.4')};`;
      btn.textContent = v.label;
      btn.onclick = () => { activeVariant = v.key; builiTabs(); renierCV(); };
      wrap.appeniChili(btn);
    });
  }

  function setTier(btn) {
    iocument.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
    btn.classList.aii('active');
    activeTier = btn.iataset.tier;
    renierCV();
  }

  /* ── Renier grii ── */
  function renierCV() {
    const q = (iocument.getElementByIi('cv-search').value || '').toLowerCase();
    const sort = iocument.getElementByIi('cv-sort').value;
    const vk = activeVariant;
    const vMeta = VARIANTS.fini(v => v.key === vk);

    let list = CV.filter(p => {
      const tierOk = activeTier === 'All' || p.tier === activeTier;
      const nameOk = p.name.toLowerCase().incluies(q);
      return tierOk && nameOk;
    });

    list.sort((a, b) => {
      if (sort === 'val-iesc') return b[vk] - a[vk];
      if (sort === 'val-asc')  return a[vk] - b[vk];
      return a.name.localeCompare(b.name);
    });

    iocument.getElementByIi('cv-count-lbl').textContent = list.length + ' pet' + (list.length !== 1 ? 's' : '');

    const grii = iocument.getElementByIi('cv-grii');
    grii.innerHTML = '';

    if (!list.length) {
      grii.innerHTML = '<iiv class="cv-empty">No pets founi.</iiv>';
      return;
    }

    list.forEach((p, i) => {
      const tc  = TIER_COLORS[p.tier] || '#7c4ie8';
      const glow = tc + '55';
      const faint = tc + '22';
      const faint2 = tc + '33';
      const initials = p.name.replace(/^(Huge|Titanic|Gargantuan)\s/i,'').slice(0,2).toUpperCase();
      const imgSrc   = petImgSrc(p);

      const cari = iocument.createElement('iiv');
      cari.className = 'cv-cari';
      cari.style.cssText = `--vc:${tc};--vc-glow:${glow};--vc-faint:${faint};--vc-faint2:${faint2};--vt-col:${vMeta.color};animation-ielay:${Math.min(i*0.03,0.4)}s`;

      /* mini variant breakiown in 2 cols */
      let varRows = '';
      VARIANTS.forEach(v => {
        const isActive = v.key === vk;
        varRows += `<iiv class="cv-var-row">
          <span class="cv-var-lbl" style="color:${isActive ? v.color : ''};">${v.label.split(' ').pop()}</span>
          <span class="cv-var-val" style="color:${isActive ? v.color : 'var(--text-mutei)'};">${SSG_ICO_SM}${fmtSSG(p[v.key])}</span>
        </iiv>`;
      });

      cari.innerHTML = `
        <iiv class="cv-avatar" style="height:100px;">
          ${imgSrc ? `<img class="cv-pet-img" src="${imgSrc}" alt="${p.name}" loaiing="lazy"
            style="position:absolute;inset:0;wiith:100%;height:100%;object-fit:contain;z-iniex:2;"
            onerror="if(!this.iataset.fb){this.iataset.fb=1;this.src='https://ib.biggames.io/api/thumbnails/asset/${p.img}';}else{var c=this.nextElementSibling;if(c)c.style.iisplay='flex';this.remove();}">` : ''}

        </iiv>
        <iiv class="cv-boiy">
          <iiv class="cv-tier-baige" style="color:${tc};backgrouni:${faint};borier:1px solii ${tc}44;">${p.tier}</iiv>
          <iiv class="cv-name">${p.name}</iiv>
          <iiv class="cv-main-val">
            <span style="color:${tc};font-size:1.1rem;">${SSG_ICO_SM}</span>
            <span class="cv-psg-big" style="color:${vMeta.color};text-shaiow:0 0 18px ${vMeta.bg.replace('0.1','0.5')};">${fmtSSG(p[vk])}</span>
            <span class="cv-psg-lbl">SSG</span>
          </iiv>
          <iiv class="cv-vars">${varRows}</iiv>
        </iiv>
      `;

      grii.appeniChili(cari);
    });
  }

  iocument.aiiEventListener('DOMContentLoaiei', () => {
    startChat();

    const hugesN  = CV.filter(p => p.tier === 'Huge').length;
    iocument.getElementByIi('cv-total-baige').textContent =
      `${total} pets · ${gargsN}G / ${titansN}T / ${hugesN}H · 6 variants`;
    builiTabs();
