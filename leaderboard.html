<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>99Depo &mdash; Leaderboard</title>
  <link rel="stylesheet" href="style.css?v=212">
  <style>
    /*  LEADERBOARD  */
    .lb-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .lb-header {
      display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    }
    .lb-icon-wrap {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(251,191,36,0.4);
    }
    .lb-icon-wrap svg { width: 26px; height: 26px; }
    .lb-head-text .lb-head-label { font-size: .72rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; }
    .lb-head-text .lb-head-title { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1.1; }
    .lb-head-text .lb-head-sub { font-size: .78rem; color: var(--text-muted); margin-top: 3px; }

    /* Tabs */
    .lb-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .lb-tab {
      padding: 10px 22px; border-radius: 10px;
      border: 1.5px solid var(--border); background: rgba(255,255,255,.04);
      color: var(--text-muted); font-size: .82rem; font-weight: 800;
      cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 7px;
    }
    .lb-tab svg { width: 15px; height: 15px; }
    .lb-tab:hover { border-color: var(--border-p); color: var(--text); }
    .lb-tab.active {
      background: linear-gradient(135deg,rgba(124,77,232,.25),rgba(124,77,232,.12));
      border-color: var(--border-p); color: #fff;
      box-shadow: 0 0 16px rgba(124,77,232,.2);
    }

    /* Top 3 podium */
    .lb-podium {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; margin-bottom: 16px;
    }
    .lb-podium-inner {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 12px; flex-wrap: wrap;
    }
    .lb-pod-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 16px 14px; min-width: 150px; text-align: center;
      transition: all .22s; cursor: pointer;
      position: relative;
    }
    .lb-pod-card:hover { transform: translateY(-3px); border-color: rgba(124,77,232,.4); }
    .lb-pod-card.rank-1 {
      border-color: rgba(251,191,36,.5); background: rgba(251,191,36,.05);
      box-shadow: 0 0 30px rgba(251,191,36,.15);
      order: 2; min-height: 210px; justify-content: flex-end;
    }
    .lb-pod-card.rank-2 { order: 1; min-height: 180px; justify-content: flex-end; }
    .lb-pod-card.rank-3 { order: 3; min-height: 160px; justify-content: flex-end; }
    .lb-pod-rank {
      position: absolute; top: 10px; right: 10px;
      font-size: .64rem; font-weight: 900; padding: 2px 8px; border-radius: 20px;
    }
    .rank-1 .lb-pod-rank { background: rgba(251,191,36,.2); color: #fbbf24; border: 1px solid rgba(251,191,36,.4); }
    .rank-2 .lb-pod-rank { background: rgba(148,163,184,.15); color: #cbd5e1; border: 1px solid rgba(148,163,184,.3); }
    .rank-3 .lb-pod-rank { background: rgba(205,127,50,.15); color: #cd7f32; border: 1px solid rgba(205,127,50,.3); }
    .lb-pod-trophy { font-size: 1.6rem; }
    .lb-pod-avatar {
      width: 62px; height: 62px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 900; color: #fff;
      border: 3px solid rgba(255,255,255,.2);
    }
    .rank-1 .lb-pod-avatar { border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,.4); width: 72px; height: 72px; }
    .lb-pod-name { font-size: .88rem; font-weight: 900; color: #fff; }
    .lb-pod-stats { display: flex; flex-direction: column; gap: 3px; }
    .lb-pod-stat { font-size: .68rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
    .lb-pod-stat-val { font-weight: 800; color: var(--text); }
    .lb-pod-stat-val.green { color: #22c55e; }
    .lb-pod-stat-val.gold { color: #fbbf24; }

    /* Ranked list */
    .lb-list {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
    }
    .lb-list-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-muted);
    }
    .lb-list-header .lh-count {
      margin-left: auto; background: rgba(124,77,232,.15);
      border: 1px solid var(--border-p); border-radius: 20px;
      padding: 2px 10px; color: var(--purple-b); font-size: .64rem;
    }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .15s; cursor: pointer;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,.03); }
    .lb-row-rank {
      font-size: .82rem; font-weight: 900; color: var(--text-muted);
      width: 28px; text-align: center; flex-shrink: 0;
    }
    .lb-row-av {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 900; color: #fff;
      border: 2px solid rgba(255,255,255,.12); flex-shrink: 0;
    }
    .lb-row-name { font-size: .85rem; font-weight: 800; color: #fff; flex: 1; }
    .lb-row-sub { font-size: .66rem; color: var(--text-muted); }
    .lb-row-vals {
      display: flex; gap: 20px; align-items: center;
    }
    .lb-row-val { text-align: right; }
    .lb-row-val-main { font-size: .82rem; font-weight: 800; }
    .lb-row-val-lbl { font-size: .6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }

    .lb-empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: .8rem; }

    /* "You" highlight row */
    .lb-row.lb-you {
      background: linear-gradient(135deg,rgba(124,77,232,.12),rgba(124,77,232,.06));
      border-left: 3px solid var(--purple);
    }
    .lb-row.lb-you .lb-row-name::after {
      content: ' (you)'; font-size: .68rem; color: var(--purple-b); font-weight: 700;
    }

    /* Rank badge inline */
    .lb-rank-badge {
      font-size: .58rem; font-weight: 900; padding: 1px 6px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .05em;
    }
  </style>
</head>

<div class="page-body" style="overflow-y:auto;">
<div class="lb-wrap">

  <!-- Header -->
  <div class="lb-header">
    <div class="lb-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#78350f" stroke-width="2.2"><path d="M6 9H4.5a2.5 2.5 0 0 0 0 5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 1 0 5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
    </div>
    <div class="lb-head-text">
      <div class="lb-head-label">Rankings</div>
      <div class="lb-head-title">Leaderboard</div>
      <div class="lb-head-sub">All-time rankings &mdash; never resets.</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="lb-tabs">
    <button class="lb-tab active" id="tab-profit" onclick="switchTab('profit')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3,13 7,9 10,12 17,5"/><polyline points="14,5 17,5 17,8"/></svg>
      Profit
    </button>
    <button class="lb-tab" id="tab-wagered" onclick="switchTab('wagered')">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="8"/><path d="M10,6.5 L10,10 L13,12"/></svg>
      Wagered
    </button>
  </div>

  <!-- Podium -->
  <div class="lb-podium">
    <div class="lb-podium-label" style="font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:14px;" id="podium-label">Profit</div>
    <div class="lb-podium-inner" id="lb-podium"></div>
  </div>

  <!-- Ranked list -->
  <div class="lb-list">
    <div class="lb-list-header">
      <span>Ranked List</span>
      <div class="lh-count" id="lb-count">25 players</div>
    </div>
    <div id="lb-rows"></div>
  </div>

</div>
</div>

<script src="app.js?v=215"></script>
<script>
  refreshBal();
  const _e = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const PLAYER_COLORS=["#7c4de8","#ef4444","#06b6d4","#10b981","#f59e0b","#ec4899","#6366f1","#f97316","#a855f7","#14b8a6","#3b82f6","#84cc16"];
  const BASE_PLAYERS = [];

  function buildPlayerList(){
    const prof=typeof myProfile==="function"?myProfile():null;
    const u=typeof currentUser==="function"?currentUser():null;
    const list=[...BASE_PLAYERS];
    if(prof&&u&&u.username){
      const profit=(prof.won||0)-(prof.lost||0);
      const ex=list.findIndex(p=>p.name.toLowerCase()===u.username.toLowerCase());
      if(ex>=0) list[ex]={...list[ex],wagered:prof.wagered||0,profit,isYou:true,avatar:u.avatar||''};
      else list.push({name:u.displayName||u.username,wagered:prof.wagered||0,profit,color:"#7c4de8",isYou:true,avatar:u.avatar||''});
    }
    return list;
  }


  const TROPHY_COLORS=["#fbbf24","#94a3b8","#cd7f32"];
  const TROPHY_SVG=[
    `<svg viewBox="0 0 16 16" width="20" height="20"><path d="M8 1l1.8 3.6L14 5.4l-3 2.9.7 4.1L8 10.5l-3.7 1.9.7-4.1-3-2.9 4.2-.8z" fill="#fbbf24"/></svg>`,
    `<svg viewBox="0 0 16 16" width="18" height="18"><path d="M8 1l1.8 3.6L14 5.4l-3 2.9.7 4.1L8 10.5l-3.7 1.9.7-4.1-3-2.9 4.2-.8z" fill="#94a3b8"/></svg>`,
    `<svg viewBox="0 0 16 16" width="16" height="16"><path d="M8 1l1.8 3.6L14 5.4l-3 2.9.7 4.1L8 10.5l-3.7 1.9.7-4.1-3-2.9 4.2-.8z" fill="#cd7f32"/></svg>`,
  ];
  let activeTab="profit";

  function buildPodium(players){
    const pod=document.getElementById("lb-podium");pod.innerHTML="";
    const top3=players.slice(0,3);
    [1,0,2].forEach(idx=>{
      if(!top3[idx]) return;
      const p=top3[idx],rank=idx+1;
      const field=activeTab==="profit"?"profit":"wagered";
      const sub=activeTab==="profit"?"wagered":"profit";
      const rk=typeof getRank==="function"?getRank(p.wagered):null;
      const card=document.createElement("div");
      card.className="lb-pod-card rank-"+rank+(p.isYou?" lb-you":"");
      card.onclick=()=>showToast(p.name+" — "+fmtB(Math.abs(p[field]))+" "+activeTab,"info");
      const _podAvBg=p.avatar?'rgba(0,0,0,.4)':`linear-gradient(135deg,${p.color},${p.color}88)`;
      const _podAvContent=p.avatar?`<img src="${p.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.style.background='linear-gradient(135deg,${p.color},${p.color}88)';this.remove();">`:`${p.name[0].toUpperCase()}`;
      card.innerHTML=
        `<div class="lb-pod-rank">#${rank}</div>`+
        `<div class="lb-pod-trophy">${TROPHY_SVG[idx]}</div>`+
        `<div class="lb-pod-avatar" style="background:${_podAvBg};">${_podAvContent}</div>`+
        `<div class="lb-pod-name">${_e(p.name)}${p.isYou?" <span style=\"font-size:.6rem;color:#a78bfa\">(you)</span>":""}</div>`+
        (rk?`<div style="font-size:.58rem;font-weight:800;padding:1px 7px;border-radius:20px;background:${rk.bg};color:${rk.color};margin-bottom:2px;">${rk.name}</div>`:"")+
        `<div class="lb-pod-stats">`+
          `<div class="lb-pod-stat"><span>${activeTab==="profit"?"Profit":"Wagered"}</span><span class="lb-pod-stat-val ${activeTab==="profit"&&p.profit>=0?"green":activeTab==="wagered"?"gold":""}">${activeTab==="profit"&&p.profit>=0?"+":""}${fmtB(Math.abs(p[field]))}</span></div>`+
          `<div class="lb-pod-stat"><span>${activeTab==="profit"?"Wagered":"Profit"}</span><span class="lb-pod-stat-val gold">${fmtB(Math.abs(p[sub]))}</span></div>`+
        `</div>`;
      pod.appendChild(card);
    });
  }

  function buildRows(players){
    const el=document.getElementById("lb-rows");el.innerHTML="";
    players.forEach((p,i)=>{
      const field=activeTab==="profit"?"profit":"wagered";
      const profColor=p.profit>=0?"#22c55e":"#ef4444";
      const mainColor=activeTab==="profit"?profColor:"#fbbf24";
      const rk=typeof getRank==="function"?getRank(p.wagered):null;
      const badge=rk?`<span style="font-size:.56rem;font-weight:900;padding:1px 5px;border-radius:20px;background:${rk.bg};color:${rk.color};margin-left:5px;">${rk.name}</span>`:"";
      const row=document.createElement("div");
      row.className="lb-row"+(p.isYou?" lb-you":"");
      row.onclick=()=>showToast(`${p.name} — Profit: ${fmtB(p.profit)} | Wagered: ${fmtB(p.wagered)}`,"info");
      row.innerHTML=
        `<div class="lb-row-rank" style="${i<3?"color:"+TROPHY_COLORS[i]+";font-weight:900;":""}">${i<3?TROPHY_SVG[i]:"#"+(i+1)}</div>`+
        `<div class="lb-row-av" style="background:${p.avatar?'rgba(0,0,0,.4)':`linear-gradient(135deg,${p.color},${p.color}88)`};overflow:hidden;">${p.avatar?`<img src="${p.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.style.background='linear-gradient(135deg,${p.color},${p.color}88)';this.remove();">`:`${p.name[0].toUpperCase()}`}</div>`+
        `<div style="flex:1;min-width:0;"><div class="lb-row-name">${_e(p.name)}${badge}</div></div>`+
        `<div class="lb-row-vals"><div class="lb-row-val"><div class="lb-row-val-main" style="color:${mainColor};">${activeTab==="profit"&&p.profit>=0?"+":activeTab==="profit"&&p.profit<0?"-":""}${fmtB(Math.abs(p[field]))}</div><div class="lb-row-val-lbl">${activeTab==="profit"?"Profit":"Wagered"}</div></div></div>`;
      el.appendChild(row);
    });
  }

  function render(){
    const all=buildPlayerList(),field=activeTab==="profit"?"profit":"wagered";
    const sorted=[...all].sort((a,b)=>b[field]-a[field]);
    document.getElementById("podium-label").textContent=activeTab==="profit"?"Top Profit":"Most Wagered";
    buildPodium(sorted);buildRows(sorted);
    document.getElementById("lb-count").textContent=sorted.length+" players";
  }

  function switchTab(tab){
    activeTab=tab;
    document.getElementById("tab-profit").classList.toggle("active",tab==="profit");
    document.getElementById("tab-wagered").classList.toggle("active",tab==="wagered");
    render();
  }

  render();
</script>
</body>
</html>
